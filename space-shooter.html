<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cubic Shooter Mobile - Auto Fire Edition</title>
    <style>
        /* CSS singkat untuk layout game */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Arial', sans-serif;
            touch-action: none; /* Mencegah zoom/scroll saat main di mobile */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* HUD (Heads Up Display) */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            color: #fff;
            font-size: 1.2rem;
            z-index: 10;
            pointer-events: none;
        }

        /* Layar Countdown / Game Over */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff;
            z-index: 100;
        }

        #countdown { font-size: 5rem; font-weight: bold; color: #00f3ff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div>SCORE: <span id="score">0</span></div>
            <div>HEALTH: <span id="health">100</span>%</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="countdown-overlay" class="overlay">
            <div id="countdown-text">READY?</div>
            <div id="countdown">3</div>
        </div>

        <div id="pause-overlay" class="overlay hidden">
            <h1>PAUSED</h1>
            <button onclick="resumeGame()">RESUME</button>
            <button onclick="resetGame()">RESTART</button>
        </div>
    </div>

    <script>
        // Masukkan logika JavaScript kamu di sini:
        // 1. Inisialisasi canvas
        // 2. Loop permainan dengan speed = 5
        // 3. Fungsi startAutoFire() yang jalan setelah countdown 0
        // 4. Fungsi stopAutoFire() saat reset/pause
    </script>
</body>
</html>
