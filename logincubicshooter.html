<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cubic Shooter</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000;
            font-family: 'Arial', sans-serif; color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Background Bintang */
        #starCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Kotak Login */
        .login-box {
            background: rgba(20, 20, 20, 0.9);
            padding: 40px; border-radius: 15px;
            border: 1px solid #333; width: 320px;
            text-align: center; transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Efek Shadow Putih saat Hover */
        .login-box:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            border-color: #555;
        }

        h2 { color: #00f3ff; margin-bottom: 5px; }
        p { font-size: 12px; color: #888; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #bbb; }
        
        input {
            width: 100%; padding: 10px; box-sizing: border-box;
            background: #111; border: 1px solid #444;
            color: white; border-radius: 5px; outline: none;
        }

        input:focus { border-color: #00f3ff; }

        button {
            width: 100%; padding: 12px; margin-top: 10px;
            border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }

        .btn-login { background: #00f3ff; color: #000; }
        .btn-login:hover { background: #00d2dd; }

        .btn-create { 
            background: transparent; color: #888; 
            border: 1px solid #444; margin-top: 10px; font-size: 11px;
        }
        .btn-create:hover { color: white; border-color: #888; }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="login-box" id="loginForm">
    <h2>Cubic Shooter</h2>
    <p>Welcome, Commander!</p>

    <div class="input-group">
        <label>Username</label>
        <input type="text" id="user" placeholder="Enter username...">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="pass" placeholder="Enter password...">
    </div>

    <button class="btn-login" onclick="handleLogin()">MASUK</button>
    <button class="btn-create" onclick="toggleForm()">Create New Account</button>
</div>

<div class="login-box" id="registerForm" style="display: none;">
    <h2>Register</h2>
    <p>Create your pilot identity</p>
    <div class="input-group">
        <label>New Username</label>
        <input type="text" id="regUser" placeholder="Choose username...">
    </div>
    <div class="input-group">
        <label>New Password</label>
        <input type="password" id="regPass" placeholder="Choose password...">
    </div>
    <button class="btn-login" style="background: #2ecc71;" onclick="handleRegister()">DAFTAR & SIMPAN</button>
    <button class="btn-create" onclick="toggleForm()">Back to Login</button>
</div>

<script>
    // --- 1. Background Bintang ---
    const canvas = document.getElementById("starCanvas");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    for(let i=0; i<150; i++) {
        stars.push({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            size: Math.random()*1.5, opacity: Math.random(), fade: Math.random()*0.02+0.005
        });
    }

    function animateStars() {
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            s.opacity += s.fade;
            if(s.opacity > 1 || s.opacity < 0) s.fade *= -1;
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();

    // --- 2. Database & Logic (Simulasi localStorage) ---
    // Struktur Database: { "username": { password: "...", progress: 1 } }
    let db = JSON.parse(localStorage.getItem("cubicShooterDB")) || {};

    function toggleForm() {
        const lForm = document.getElementById("loginForm");
        const rForm = document.getElementById("registerForm");
        lForm.style.display = lForm.style.display === "none" ? "block" : "none";
        rForm.style.display = rForm.style.display === "none" ? "block" : "none";
    }

    function handleRegister() {
        const u = document.getElementById("regUser").value;
        const p = document.getElementById("regPass").value;

        if(u === "" || p === "") return alert("Isi semua data!");
        if(db[u]) return alert("Username sudah terdaftar!");

        db[u] = { password: p, progress: 1 };
        localStorage.setItem("cubicShooterDB", JSON.stringify(db));
        alert("Akun Berhasil Dibuat! Silahkan Login.");
        toggleForm();
    }

    function handleLogin() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;

        if(db[u] && db[u].password === p) {
            // Simpan sesi login aktif
            sessionStorage.setItem("activeUser", u);
            alert("Login Berhasil! Mengakses Hangar...");
            // Ganti 'game.html' dengan nama file game kamu
            window.location.href = "space-shooter.html"; 
        } else {
            alert("Username atau Password salah/belum terdaftar!");
        }
    }
</script>
</body>
</html>
